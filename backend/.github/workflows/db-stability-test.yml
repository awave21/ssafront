name: Database Stability Test

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'infra/docker-compose.yml'
      - 'infra/**'
      - '.env'
      - 'backend/**'
      - 'test-db-stability-quick.sh'
      - '.github/workflows/db-stability-test.yml'
  pull_request:
    branches: [ main ]
  schedule:
    # Запускать каждый день в 3:00 UTC
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  test-db-stability:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Create .env file
      run: |
        cat > .env << EOF
        POSTGRES_USER=postgres
        POSTGRES_PASSWORD=postgres
        POSTGRES_DB=agents
        POSTGRES_HOST=db
        POSTGRES_PORT=5432
        DB_POOL_SIZE=20
        DB_MAX_OVERFLOW=30
        EOF
    
    - name: Start services
      run: |
        docker compose --env-file .env -f infra/docker-compose.yml up -d
        sleep 15
    
    - name: Wait for API to be ready
      run: |
        max_attempts=30
        attempt=1
        while [ $attempt -le $max_attempts ]; do
          if curl -s -f http://localhost:8000/api/v1/health > /dev/null 2>&1; then
            echo "API is ready"
            break
          fi
          echo "Waiting for API... (attempt $attempt/$max_attempts)"
          sleep 2
          attempt=$((attempt + 1))
        done
    
    - name: Run quick stability test
      run: |
        chmod +x test-db-stability-quick.sh
        ./test-db-stability-quick.sh
    
    - name: Test DB restart
      run: |
        docker compose -f infra/docker-compose.yml restart db
        sleep 5
        ./test-db-stability-quick.sh
    
    - name: Test API restart
      run: |
        docker compose -f infra/docker-compose.yml restart api
        sleep 8
        ./test-db-stability-quick.sh
    
    - name: Test full restart
      run: |
        docker compose -f infra/docker-compose.yml down
        docker compose --env-file .env -f infra/docker-compose.yml up -d
        sleep 15
        ./test-db-stability-quick.sh
    
    - name: Check logs for errors
      if: always()
      run: |
        echo "=== API Logs ==="
        docker compose -f infra/docker-compose.yml logs api --tail 50
        echo ""
        echo "=== DB Logs ==="
        docker compose -f infra/docker-compose.yml logs db --tail 50
    
    - name: Cleanup
      if: always()
      run: docker compose -f infra/docker-compose.yml down -v
