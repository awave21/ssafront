services:
  db:
    restart: unless-stopped
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_MAX_CONNECTIONS: 200
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    cpus: "${DB_CPUS:-0.60}"
    mem_limit: "${DB_MEM_LIMIT:-1280m}"
    mem_reservation: "${DB_MEM_RESERVATION:-640m}"

  redis:
    restart: unless-stopped
    image: redis:7
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    cpus: "${REDIS_CPUS:-0.15}"
    mem_limit: "${REDIS_MEM_LIMIT:-320m}"
    mem_reservation: "${REDIS_MEM_RESERVATION:-160m}"

  api:
    build:
      context: ../backend
    env_file:
      - ./.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
      REDIS_URL: ${REDIS_URL}
      PYTHONPATH: /app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/logs
    expose:
      - "8000"
    ports:
      - "${API_BIND_ADDRESS:-127.0.0.1}:${API_BIND_PORT:-8000}:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    cpus: "${API_CPUS:-2.0}"
    mem_limit: "${API_MEM_LIMIT:-1024m}"
    mem_reservation: "${API_MEM_RESERVATION:-512m}"

  sqns-sync-worker:
    restart: unless-stopped
    build:
      context: ../backend
    env_file:
      - ./.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
      REDIS_URL: ${REDIS_URL}
      PYTHONPATH: /app
      SKIP_ALEMBIC: "1"
    command: ["python", "-m", "app.workers.sqns_hourly_sync"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/logs
    cpus: "${SQNS_WORKER_CPUS:-0.40}"
    mem_limit: "${SQNS_WORKER_MEM_LIMIT:-512m}"
    mem_reservation: "${SQNS_WORKER_MEM_RESERVATION:-256m}"

  script-flow-index-worker:
    restart: unless-stopped
    build:
      context: ../backend
    env_file:
      - ./.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
      REDIS_URL: ${REDIS_URL}
      PYTHONPATH: /app
      SKIP_ALEMBIC: "1"
    command: ["python", "-m", "app.workers.script_flow_index"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/logs
    cpus: "${SCRIPT_FLOW_INDEX_WORKER_CPUS:-0.40}"
    mem_limit: "${SCRIPT_FLOW_INDEX_WORKER_MEM_LIMIT:-512m}"
    mem_reservation: "${SCRIPT_FLOW_INDEX_WORKER_MEM_RESERVATION:-256m}"

  frontend:
    restart: unless-stopped
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        NUXT_PUBLIC_API_BASE: ${FRONTEND_API_BASE:-/api/v1}
        NUXT_PUBLIC_SITE_URL: ${FRONTEND_SITE_URL:-https://lk.chatmedbot.ru}
        NUXT_PUBLIC_DOMAIN: ${FRONTEND_DOMAIN:-lk.chatmedbot.ru}
        NUXT_PUBLIC_NODE_ENV: production
    expose:
      - "80"
    healthcheck:
      test: ["CMD", "caddy", "validate", "--config", "/etc/caddy/Caddyfile", "--adapter", "caddyfile"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    cpus: "${FRONTEND_CPUS:-0.50}"
    mem_limit: "${FRONTEND_MEM_LIMIT:-256m}"
    mem_reservation: "${FRONTEND_MEM_RESERVATION:-128m}"

  netdata:
    restart: unless-stopped
    image: netdata/netdata:stable
    environment:
      NETDATA_ALERTS_SEND_TELEGRAM: ${SEND_TELEGRAM:-NO}
      NETDATA_ALERTS_TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      NETDATA_ALERTS_DEFAULT_RECIPIENT_TELEGRAM: ${DEFAULT_RECIPIENT_TELEGRAM:-}
    expose:
      - "19999"
    cap_add:
      - SYS_PTRACE
    security_opt:
      - apparmor:unconfined
    volumes:
      - netdata_config:/etc/netdata
      - ./netdata/health_alarm_notify.conf:/etc/netdata/health_alarm_notify.conf:ro
      - netdata_lib:/var/lib/netdata
      - netdata_cache:/var/cache/netdata
      - /etc/passwd:/host/etc/passwd:ro
      - /etc/group:/host/etc/group:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /etc/os-release:/host/etc/os-release:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    cpus: "${NETDATA_CPUS:-0.35}"
    mem_limit: "${NETDATA_MEM_LIMIT:-384m}"
    mem_reservation: "${NETDATA_MEM_RESERVATION:-192m}"

  caddy:
    restart: unless-stopped
    image: caddy:2.10-alpine
    environment:
      ACME_EMAIL: ${ACME_EMAIL}
      DOCS_AUTH_USER: ${DOCS_AUTH_USER}
      DOCS_AUTH_HASH: ${DOCS_AUTH_HASH}
      MONITOR_PATH: ${MONITOR_PATH}
      MONITOR_AUTH_USER: ${MONITOR_AUTH_USER}
      MONITOR_AUTH_HASH: ${MONITOR_AUTH_HASH}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - frontend
      - netdata
    healthcheck:
      test: ["CMD", "caddy", "validate", "--config", "/etc/caddy/Caddyfile", "--adapter", "caddyfile"]
      interval: 30s
      timeout: 10s
      retries: 3
    cpus: "${CADDY_CPUS:-0.50}"
    mem_limit: "${CADDY_MEM_LIMIT:-256m}"
    mem_reservation: "${CADDY_MEM_RESERVATION:-128m}"

  pgadmin:
    restart: unless-stopped
    image: dpage/pgadmin4:8
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
      PGADMIN_CONFIG_SCRIPT_NAME: "'/postgres'"
      PGADMIN_CONFIG_SESSION_COOKIE_PATH: "'/postgres/'"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - "5050:80"
    depends_on:
      - db
    cpus: "${PGADMIN_CPUS:-0.10}"
    mem_limit: "${PGADMIN_MEM_LIMIT:-192m}"
    mem_reservation: "${PGADMIN_MEM_RESERVATION:-128m}"

  watcher:
    image: docker:cli
    command: >
      sh -c "echo 'Watcher started...' && docker events --filter 'type=container' --filter 'event=die' --filter 'event=start' --format '{{.Time}} | {{.Action}} | {{.Actor.Attributes.name}} ({{.Actor.ID}})' >> /logs/events.log"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./logs:/logs
    restart: unless-stopped
    cpus: "${WATCHER_CPUS:-0.05}"
    mem_limit: "${WATCHER_MEM_LIMIT:-96m}"
    mem_reservation: "${WATCHER_MEM_RESERVATION:-64m}"

volumes:
  postgres_data:
  pgadmin_data:
  caddy_data:
  caddy_config:
  netdata_config:
  netdata_lib:
  netdata_cache:
