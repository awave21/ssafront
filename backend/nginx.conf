server {
  listen 80;
  server_name agentsapp.integration-ai.ru;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  server_name agentsapp.integration-ai.ru front.agentsapp.integration-ai.ru;

  ssl_certificate /etc/letsencrypt/live/agentsapp.integration-ai.ru/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/agentsapp.integration-ai.ru/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers on;

  location / {
    resolver 127.0.0.11 valid=30s;
    set $upstream_api http://api:8000;
    proxy_pass $upstream_api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    # WebSocket support
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_connect_timeout 3s;
    proxy_send_timeout 30s;
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 3600;
    proxy_next_upstream error timeout http_502 http_503 http_504;
    proxy_next_upstream_tries 3;
    proxy_next_upstream_timeout 5s;
    proxy_intercept_errors on;
    error_page 502 503 504 = /__upstream_unavailable;
  }

  location = /__upstream_unavailable {
    internal;
    default_type text/html;
    add_header Cache-Control "no-store";
    add_header Retry-After "3";
    return 503 "<!doctype html><html><head><meta charset=\"utf-8\"><title>Service is starting</title></head><body><h1>Service is starting</h1><p>Please retry in a few seconds.</p></body></html>";
  }

  location = /postgres {
    return 301 /postgres/;
  }

  location /postgres/ {
    resolver 127.0.0.11 valid=30s;
    set $upstream_pgadmin http://pgadmin:80;
    proxy_pass $upstream_pgadmin;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Prefix /postgres;
    proxy_set_header X-Script-Name /postgres;
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 3600;
  }
}
